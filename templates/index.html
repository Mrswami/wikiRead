<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wikiRead — Learn on the Go</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- HOME PAGE -->
  <div class="home-page">
    <header class="home-header">
      <div class="logo">
        <span class="logo-icon">📖</span>
        <h1>wiki<span class="logo-accent">Read</span></h1>
      </div>
      <p class="tagline">Share any Wikipedia article. Listen &amp; learn on the go.</p>
    </header>

    <main class="home-main">
      {% if error %}
      <div class="error-card">
        <span>⚠️</span> {{ error }}
      </div>
      {% endif %}

      <section class="search-section">
        <form action="/read" method="GET" class="url-form">
          <div class="input-group">
            <input
              type="url"
              name="url"
              id="url-input"
              placeholder="Paste a Wikipedia URL..."
              required
              autocomplete="off"
            />
            <button type="submit" class="btn-primary">
              <span>Read</span> <span class="btn-arrow">→</span>
            </button>
          </div>
        </form>
      </section>

      <section class="history-section" id="historySection" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: calc(var(--space) * 1.5);">
          <h2 class="section-label" style="margin-bottom:0;">Recently Read</h2>
          <button onclick="clearLocalHistory()" style="background:transparent; border:none; color:var(--danger); font-size:0.7rem; cursor:pointer; text-transform:uppercase; font-weight:700; letter-spacing:0.05em;">Clear</button>
        </div>
        <ul class="history-list" id="localHistoryList">
          <!-- Populated by JS -->
        </ul>
      </section>

      <section class="empty-state" id="emptyState">
        <div class="empty-icon">🌐</div>
        <p>Share any Wikipedia article to Termux<br/>or paste a link above to get started.</p>
      </section>

    </main>
  </div>

  <script>
    function loadLocalHistory() {
      const history = JSON.parse(localStorage.getItem('wikiRead_history') || '[]');
      const list = document.getElementById('localHistoryList');
      const section = document.getElementById('historySection');
      const empty = document.getElementById('emptyState');

      if (history.length > 0) {
        section.style.display = 'block';
        empty.style.display = 'none';
        list.innerHTML = '';
        history.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `
            <a href="/read?url=${encodeURIComponent(item.url)}" class="history-item">
              <span class="history-icon">📄</span>
              <span class="history-title">${item.title}</span>
              <span class="history-arrow">›</span>
            </a>
          `;
          list.appendChild(li);
        });
      } else {
        section.style.display = 'none';
        empty.style.display = 'block';
      }
    }

    function clearLocalHistory() {
      if(confirm("Clear all recently read articles?")) {
        localStorage.removeItem('wikiRead_history');
        loadLocalHistory();
      }
    }

    document.addEventListener('DOMContentLoaded', loadLocalHistory);
  </script>
    </main>
  </div>

</body>
</html>
